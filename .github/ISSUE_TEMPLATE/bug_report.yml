name: Bug report
description: Report a reproducible problem with Cadence Code
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Search existing issues first. For security
        vulnerabilities, use the private reporting link in SECURITY.md.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This report does not contain a security vulnerability or sensitive data.
          required: true
  - type: input
    id: version
    attributes:
      label: Cadence Code version
      description: Use the version reported by `voice_status` when possible.
      placeholder: Output of voice_status
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      description: Which coding agent was running Cadence Code?
      options:
        - Codex
        - Claude Code
        - Google Antigravity
    validations:
      required: true
  - type: input
    id: host_version
    attributes:
      label: Host version
      description: Use the version reported by `codex --version`, `claude --version`, or `agy --version`.
      placeholder: Host name and version
    validations:
      required: true
  - type: input
    id: install_context
    attributes:
      label: Release or local install context
      description: For a release, include its tag or install source. For a local checkout, include the branch and short commit.
      placeholder: GitHub release vX.Y.Z, or local branch-name at abc1234
    validations:
      required: true
  - type: textarea
    id: system
    attributes:
      label: macOS and hardware
      description: Include all three details below.
      placeholder: |
        macOS version:
        Mac model/chip:
        Python version:
    validations:
      required: true
  - type: textarea
    id: models
    attributes:
      label: Selected speech models
      description: Use the configured model names reported by Cadence Code when possible.
      placeholder: |
        TTS model:
        STT model:
    validations:
      required: true
  - type: textarea
    id: audio
    attributes:
      label: Audio devices (if relevant)
      description: Include input/output device names, whether they are default or explicitly configured, and any Bluetooth, USB, sample-rate, or routing details related to the bug.
      placeholder: |
        Input device:
        Output device:
        Other relevant audio details:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Say ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste a short redacted excerpt. Never attach private transcripts, recordings, tokens, or credentials.
      render: shell
