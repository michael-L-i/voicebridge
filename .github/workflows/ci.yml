name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.macos }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Preserve the names of the two existing required checks while this
          # PR expands the matrix. The aggregate gate below becomes required
          # after this PR lands.
          - macos: "macos-14"
            python: "3.11"
            name: "Python 3.11"
          - macos: "macos-14"
            python: "3.13"
            name: "Python 3.13"
          - macos: "macos-14"
            python: "3.12"
            name: "macOS 14, Python 3.12"
          - macos: "macos-14"
            python: "3.14"
            name: "macOS 14, Python 3.14"
          - macos: "macos-15"
            python: "3.11"
            name: "macOS 15, Python 3.11"
          - macos: "macos-15"
            python: "3.12"
            name: "macOS 15, Python 3.12"
          - macos: "macos-15"
            python: "3.13"
            name: "macOS 15, Python 3.13"
          - macos: "macos-15"
            python: "3.14"
            name: "macOS 15, Python 3.14"
          - macos: "macos-26"
            python: "3.11"
            name: "macOS 26, Python 3.11"
          - macos: "macos-26"
            python: "3.12"
            name: "macOS 26, Python 3.12"
          - macos: "macos-26"
            python: "3.13"
            name: "macOS 26, Python 3.13"
          - macos: "macos-26"
            python: "3.14"
            name: "macOS 26, Python 3.14"
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "${{ matrix.python }}"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the production dependency export
        run: |
          uv lock --check
          exported_requirements="$(mktemp)"
          uv export --locked --no-dev --no-emit-project --no-annotate \
            --no-header --output-file "$exported_requirements" >/dev/null
          diff -u requirements.lock "$exported_requirements"

      - name: Bootstrap an empty production environment
        env:
          CADENCE_CODE_DATA_DIR: ${{ runner.temp }}/cadence-code-bootstrap
          CADENCE_CODE_PYTHON: python
        run: ./bin/cadence-code-mcp-bootstrap </dev/null

      - name: Verify the bootstrapped Kokoro English frontend
        run: |
          $RUNNER_TEMP/cadence-code-bootstrap/venv/bin/python -m unittest \
            discover -s tests -p test_kokoro_frontend.py -v

      - name: Verify the native MLX runtime
        run: $RUNNER_TEMP/cadence-code-bootstrap/venv/bin/python -c 'import mlx.core as mx; print(mx.default_device())'

      - name: Validate plugin contracts
        run: $RUNNER_TEMP/cadence-code-bootstrap/venv/bin/python scripts/validate_plugin.py

      - name: Run unit tests
        run: $RUNNER_TEMP/cadence-code-bootstrap/venv/bin/python -m unittest discover -s tests -v

  package:
    name: Package artifacts
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the lockfile
        run: uv lock --check

      - name: Build and inspect package artifacts
        run: |
          artifact_dir="$(mktemp -d)"
          uv build --out-dir "$artifact_dir"
          python scripts/verify_distribution.py "$artifact_dir"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  complete:
    name: CI complete
    needs: [test, package, dependency-review]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every validation job to pass
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          test "$TEST_RESULT" = success
          test "$PACKAGE_RESULT" = success
          case "$DEPENDENCY_REVIEW_RESULT" in
            success|skipped) ;;
            *)
              echo "Dependency review did not pass: $DEPENDENCY_REVIEW_RESULT" >&2
              exit 1
              ;;
          esac
