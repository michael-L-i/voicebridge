name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "${{ matrix.python }}"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the lockfile
        run: uv lock --check

      - name: Install the locked environment
        run: uv sync --locked --python "${{ matrix.python }}"

      - name: Verify the native MLX runtime
        run: |
          uv run --locked --python "${{ matrix.python }}" python -c \
            'import mlx.core as mx; print(mx.default_device())'

      - name: Validate plugin contracts
        run: uv run --locked --python "${{ matrix.python }}" python scripts/validate_plugin.py

      - name: Run unit tests
        run: uv run --locked --python "${{ matrix.python }}" python -m unittest discover -s tests -v

      - name: Build and inspect package artifacts
        run: |
          artifact_dir="$(mktemp -d)"
          uv build --out-dir "$artifact_dir"
          uv run --locked --python "${{ matrix.python }}" python scripts/verify_distribution.py "$artifact_dir"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
