name: Release verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to verify
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-verification-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="v$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$RELEASE_TAG" = "$expected" || {
            echo "Release tag $RELEASE_TAG does not match package version $expected" >&2
            exit 1
          }

      - name: Verify the locked environment
        run: |
          uv lock --check
          uv sync --locked --python 3.13

      - name: Validate source and plugins
        run: |
          uv run --locked --python 3.13 python -c 'import mlx.core as mx; print(mx.default_device())'
          uv run --locked --python 3.13 python scripts/validate_plugin.py
          uv run --locked --python 3.13 python -m unittest discover -s tests -v

      - name: Build and inspect release artifacts
        run: |
          artifact_dir="$(mktemp -d)"
          uv build --out-dir "$artifact_dir"
          uv run --locked --python 3.13 python scripts/verify_distribution.py "$artifact_dir"
