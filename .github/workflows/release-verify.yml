name: Release verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to verify
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-verification-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release (${{ matrix.macos }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.macos }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        macos: ["macos-14", "macos-15", "macos-26"]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out release source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "${{ matrix.python }}"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="v$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$RELEASE_TAG" = "$expected" || {
            echo "Release tag $RELEASE_TAG does not match package version $expected" >&2
            exit 1
          }

      - name: Verify the production dependency export
        run: |
          uv lock --check
          exported_requirements="$(mktemp)"
          uv export --locked --no-dev --no-emit-project --no-annotate \
            --no-header --output-file "$exported_requirements" >/dev/null
          diff -u requirements.lock "$exported_requirements"

      - name: Bootstrap an empty release environment
        env:
          VOICEBRIDGE_DATA_DIR: ${{ runner.temp }}/voicebridge-bootstrap
          VOICEBRIDGE_PYTHON: python
        run: ./bin/voicebridge-mcp-bootstrap </dev/null

      - name: Verify the bootstrapped Kokoro English frontend
        run: |
          $RUNNER_TEMP/voicebridge-bootstrap/venv/bin/python -m unittest \
            discover -s tests -p test_kokoro_frontend.py -v

      - name: Validate source and plugins
        run: |
          runtime_python="$RUNNER_TEMP/voicebridge-bootstrap/venv/bin/python"
          "$runtime_python" -c 'import mlx.core as mx; print(mx.default_device())'
          "$runtime_python" scripts/validate_plugin.py
          "$runtime_python" -m unittest discover -s tests -v

      - name: Build and inspect release artifacts
        run: |
          artifact_dir="$(mktemp -d)"
          uv build --out-dir "$artifact_dir"
          "$RUNNER_TEMP/voicebridge-bootstrap/venv/bin/python" \
            scripts/verify_distribution.py "$artifact_dir"
