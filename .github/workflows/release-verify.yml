name: Release verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to verify
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-verification-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release (${{ matrix.macos }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.macos }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        macos: ["macos-14", "macos-15", "macos-26"]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out release source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "${{ matrix.python }}"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.7.11"

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="v$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$RELEASE_TAG" = "$expected" || {
            echo "Release tag $RELEASE_TAG does not match package version $expected" >&2
            exit 1
          }

      - name: Verify the locked environment
        run: |
          uv lock --check
          uv sync --locked --python "${{ matrix.python }}"

      - name: Validate source and plugins
        run: |
          uv run --locked --python "${{ matrix.python }}" python -c 'import mlx.core as mx; print(mx.default_device())'
          uv run --locked --python "${{ matrix.python }}" python scripts/validate_plugin.py
          uv run --locked --python "${{ matrix.python }}" python -m unittest discover -s tests -v

      - name: Build and inspect release artifacts
        run: |
          artifact_dir="$(mktemp -d)"
          uv build --out-dir "$artifact_dir"
          uv run --locked --python "${{ matrix.python }}" python scripts/verify_distribution.py "$artifact_dir"
